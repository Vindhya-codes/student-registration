<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Page</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="card">
<h3 id="h3">Student Registration</h3>
<p class="subtitle">Skill Development Program</p>

<form id="regForm" novalidate>

<div class="field-row">
<div class="field">
<label for="fname">First Name</label>
<input type="text" id="fname">
<span class="error" id="fname-error"></span>
</div>
<div class="field">
<label for="lname">Last Name</label>
<input type="text" id="lname">
<span class="error" id="lname-error"></span>
</div>
</div>

<div class="field-row">
<div class="field">
<label for="mail">Email Address</label>

<input type="email" id="mail" placeholder="you@example.com">
<span class="error" id="mail-error"></span>
</div>
<div class="field">
<label for="password">Password</label>
<input type="password" id="password" placeholder="At least 6 characters">
<span class="error" id="password-error"></span>
</div>
</div>

<div class="field-row">
<div class="field">
<label for="phno">Phone Number</label>
<input type="tel" id="phno" placeholder="10-digit number">
<span class="error" id="phno-error"></span>
</div>
<div class="field">
<label for="age">Age</label>
<input type="number" id="age" min="17" max="25">
<span class="error" id="age-error"></span>
</div>
</div>

<div class="field">

<label for="dob">Date of Birth</label>
<input type="date" id="dob">
<span class="error" id="dob-error"></span>
</div>

<div class="field">
<span class="group-label">Gender</span>

<div class="radio-group">
<label><input type="radio" id="female" name="gender" value="Female">
Female</label>
<label><input type="radio" id="male" name="gender" value="Male"> Male</label>
</div>
<span class="error" id="gender-error"></span>
</div>

<div class="field">
<label for="cname">College Name</label>
<input type="text" id="cname">
<span class="error" id="cname-error"></span>
</div>

<div class="field">
<span class="group-label">Graduating Year</span>
<div class="radio-group">
<label><input type="radio" id="y2027" name="gyear" value="2027"> 2027</label>
<label><input type="radio" id="y2028" name="gyear" value="2028"> 2028</label>
<label><input type="radio" id="y2029" name="gyear" value="2029"> 2029</label>

<label><input type="radio" id="y2030" name="gyear" value="2030"> 2030</label>
</div>
<span class="error" id="gyear-error"></span>
</div>

<div class="field-row">
<div class="field">
<label for="cdegree">Course</label>
<select id="cdegree">
<option value="" selected disabled>Select course</option>
<option id="btech" value="B Tech">B Tech</option>
<option id="mtech" value="M Tech">M Tech</option>

</select>
<span class="error" id="cdegree-error"></span>
</div>
<div class="field">
<label for="cgpa">CGPA</label>
<input type="number" id="cgpa" min="1" max="10" step="0.01">
<span class="error" id="cgpa-error"></span>
</div>
</div>

<div class="field">
<label for="sname">School Name</label>
<input type="text" id="sname">
<span class="error" id="sname-error"></span>
</div>

<div class="field-row">
<div class="field">
<label for="tenth">10th Marks (%)</label>
<input type="number" id="tenth" min="1" max="100" step="0.01">
<span class="error" id="tenth-error"></span>
</div>
<div class="field">
<label for="twelfth">12th Marks (%)</label>
<input type="number" id="twelfth" min="1" max="100" step="0.01">
<span class="error" id="twelfth-error"></span>
</div>
</div>

<div class="field">
<span class="group-label">Program for Skill Development</span>

<div class="radio-group">
<label><input type="radio" id="aws" name="skillcourse" value="AWS"> AWS</label>
<label><input type="radio" id="cyb" name="skillcourse" value="Cyber Security"> Cyber
Security</label>
<label><input type="radio" id="data" name="skillcourse" value="Data Engineering">
Data
Engineering</label>
<label><input type="radio" id="ai" name="skillcourse" value="Agentic AI"> Agentic
AI</label>
</div>
<span class="error" id="skillcourse-error"></span>
</div>

<div class="button-row">
<button type="submit" id="submit">Submit</button><br>
<button type="reset" id="reset">Reset</button>
</div>
<span class="error" id="validate-error"></span>
</form>
</div>

<script src="script.js"></script>
</body>
</html>
